<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bluewave Academy">
  <defs>
    <linearGradient id="bw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bw-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bw-bg)"/>
  <!-- Three stacked waves: knowledge in motion -->
  <path d="M8 42 C 18 32, 26 52, 36 42 S 54 32, 58 42"
        fill="none" stroke="url(#bw-wave)" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M8 32 C 18 22, 26 42, 36 32 S 54 22, 58 32"
        fill="none" stroke="url(#bw-wave)" stroke-width="3.2" stroke-linecap="round" opacity="0.85"/>
  <path d="M8 22 C 18 14, 26 30, 36 22 S 54 14, 58 22"
        fill="none" stroke="url(#bw-wave)" stroke-width="3.2" stroke-linecap="round" opacity="0.65"/>
  <!-- Graduation spark -->
  <circle cx="50" cy="16" r="2.6" fill="#fde68a"/>
</svg>
